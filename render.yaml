services:
  - type: web
    name: nsu-audit-api
    env: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: AUDIT_API_KEY
        generateValue: true      # Render auto-generates a secret value
      - key: BATCH_WORKERS
        value: "4"               # parallel Tesseract workers for bulk jobs
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
