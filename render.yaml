services:
  - type: web
    name: nsu-audit-api
    runtime: python
    buildCommand: pip install -r packages/api/requirements.txt
    startCommand: uvicorn packages.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AUDIT_API_KEY
        sync: false
    plan: free
