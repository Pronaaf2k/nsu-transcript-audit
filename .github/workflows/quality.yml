name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-js:
    name: ESLint + TypeScript (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --workspace=web

      - name: Lint
        run: npm run lint --workspace=web

  lint-python:
    name: Ruff + Pylint (cli + audit_engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: pip install ruff pylint

      - name: Ruff check
        run: ruff check cli/ audit_engine/

      - name: Pylint (non-blocking)
        run: pylint cli/ audit_engine/ --fail-under=7.0
        continue-on-error: false

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}

  audit-tests:
    name: Python Audit Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        working-directory: ./
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ./
        run: python run_tests.py
