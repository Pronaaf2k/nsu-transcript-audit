name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── ESLint + TypeScript ───────────────────────────────────────────────────────
  lint-js:
    name: ESLint + TypeScript (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: web
        run: npm install          # use install, not ci (no lockfile committed)

      - name: Lint
        working-directory: web
        run: npm run lint

  # ── Python linters ────────────────────────────────────────────────────────────
  lint-python:
    name: Ruff + Pylint (cli + audit_engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install ruff pylint

      - name: Ruff check
        run: ruff check cli/ audit_engine/ api/

      - name: Pylint
        run: |
          pylint cli/ audit_engine/ api/main.py api/batch.py \
            --fail-under=6.0 \
            --disable=C0114,C0115,C0116,E0401,W0611
        continue-on-error: true   # advisory — won't block merges

  # ── SonarCloud — only runs when SONAR_TOKEN secret is configured ─────────────
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    # Skip entirely if the secret hasn't been added yet
    if: ${{ secrets.SONAR_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}

  # ── Audit unit tests ──────────────────────────────────────────────────────────
  audit-tests:
    name: Python Audit Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r api/requirements.txt

      - name: Run audit engine tests
        run: python -m pytest tests/ -v --tb=short
        continue-on-error: true   # no tests yet — won't block merges
